name: Deploy JS demo to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "js/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.1.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml

      - name: Install JS dependencies
        working-directory: js
        run: pnpm install --frozen-lockfile

      - name: Build Mirage WASM
        working-directory: mirage_zig
        run: zig build wasm -Doptimize=ReleaseFast

      - name: Check demo
        working-directory: js
        run: pnpm --filter demo check

      - name: Build demo
        working-directory: js
        env:
          GITHUB_PAGES: "true"
        run: pnpm --filter demo build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: js/demo/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
